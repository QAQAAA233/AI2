<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 自動化開發控制器</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <header>
          <h1>AI 控制中心</h1>
          <p class="subtitle">托管模式 · 專案記憶 · VSCode 控制</p>
        </header>
        <section class="project-section">
          <h2>專案</h2>
          <div class="project-form">
            <input id="project-name" type="text" placeholder="輸入專案名稱" />
            <button id="project-load">載入 / 建立</button>
          </div>
          <div id="project-status" class="status-card">請先建立或載入專案</div>
        </section>
        <section class="automation-section">
          <h2>自動化工具</h2>
          <div class="tool-grid">
            <button id="btn-open-vscode" class="tool-button">開啟 VSCode</button>
            <button id="btn-run-command" class="tool-button">執行指令</button>
            <button id="btn-screenshot" class="tool-button">截圖分析</button>
          </div>
          <textarea id="command-input" rows="3" placeholder="輸入要執行的指令 (例如: npm run dev)"></textarea>
        </section>
      </aside>
      <main class="chat-container">
        <section class="chat-header">
          <div class="model-info">
            <span class="model-name" id="model-name">Gemini</span>
            <span class="token-info" id="token-info">Tokens: 0</span>
          </div>
          <div class="conversation-info">
            <span id="conversation-id">對話：-</span>
            <span id="last-update">最後更新：-</span>
          </div>
        </section>
        <section id="chat-messages" class="chat-messages"></section>
        <section class="composer">
          <textarea
            id="prompt-input"
            rows="4"
            placeholder="輸入需求或指示，例如：建立新的API端點，並監控日誌。"
          ></textarea>
          <div class="composer-actions">
            <button id="send-button" class="primary">送出</button>
            <button id="hosted-toggle" class="secondary">啟動托管模式</button>
          </div>
        </section>
      </main>
    </div>
    <template id="message-template">
      <article class="message">
        <div class="avatar"></div>
        <div class="bubble">
          <header class="bubble-header">
            <span class="role"></span>
            <span class="timestamp"></span>
          </header>
          <div class="content"></div>
        </div>
      </article>
    </template>
    <script src="/static/js/app.js" type="module"></script>
  </body>
</html>
