<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 自動化開發控制器</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="sidebar__header">
          <h1>AI 控制器</h1>
          <button id="new-conversation" class="btn btn--ghost">＋ 新對話</button>
        </header>
        <nav class="sidebar__nav">
          <h2>專案</h2>
          <ul id="project-list"></ul>
        </nav>
        <footer class="sidebar__footer">
          <button id="open-config" class="btn btn--secondary">系統設定</button>
        </footer>
      </aside>
      <main class="main">
        <section class="chat">
          <div class="chat__header">
            <div>
              <h2 id="conversation-title">即時對話</h2>
              <p id="conversation-meta">尚未選擇專案</p>
            </div>
            <div class="chat__actions">
              <button id="start-autopilot" class="btn btn--primary">啟動托管模式</button>
            </div>
          </div>
          <div id="chat-history" class="chat__history"></div>
          <form id="chat-form" class="chat__input" autocomplete="off">
            <textarea id="prompt" placeholder="輸入需求或指令..." rows="3"></textarea>
            <div class="chat__input-actions">
              <button type="submit" class="btn btn--primary">送出</button>
            </div>
          </form>
        </section>
        <aside class="insights">
          <section>
            <h3>自動化輸出</h3>
            <pre id="automation-output" class="insights__block"></pre>
          </section>
          <section>
            <h3>系統狀態</h3>
            <div id="system-status" class="status-grid"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="config-dialog" class="modal">
      <form method="dialog" class="modal__content">
        <header class="modal__header">
          <h2>系統設定</h2>
          <button value="cancel" class="btn btn--ghost">關閉</button>
        </header>
        <section class="modal__body">
          <label class="field">
            <span>Gemini API Key</span>
            <input id="config-api-key" type="password" placeholder="輸入 API Key" />
          </label>
          <label class="field">
            <span>模型名稱</span>
            <input id="config-model" type="text" placeholder="gemini-2.0-flash-exp" />
          </label>
        </section>
        <footer class="modal__footer">
          <button value="save" class="btn btn--primary">儲存</button>
        </footer>
      </form>
    </dialog>

    <script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
  </body>
</html>
