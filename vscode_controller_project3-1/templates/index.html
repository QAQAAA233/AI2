<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 自動化開發控制器</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-icon">🤖</span>
          <div>
            <h1>AI 自動化開發控制器</h1>
            <p class="subtitle">2025 模組化重構 · ChatGPT 亮色體驗</p>
          </div>
        </div>
        <div class="status-badges">
          <span class="badge" id="provider-badge">AI Provider</span>
          <span class="badge" id="project-badge">未選擇專案</span>
        </div>
      </header>

      <main class="main-grid">
        <section class="panel panel-secondary" id="project-panel">
          <h2>專案管理</h2>
          <form id="project-form" class="stack">
            <label class="field">
              <span>資料夾名稱</span>
              <input type="text" name="folder" placeholder="demo-project" required />
            </label>
            <label class="field">
              <span>專案顯示名稱</span>
              <input type="text" name="name" placeholder="我的自動化專案" required />
            </label>
            <label class="field">
              <span>描述</span>
              <textarea name="description" rows="2" placeholder="描述專案目標"></textarea>
            </label>
            <button type="submit" class="btn btn-primary">建立 / 載入</button>
          </form>

          <div class="project-list" id="project-list"></div>
          <div class="project-structure">
            <h3>結構預覽</h3>
            <pre id="structure-view">請選擇專案以查看結構</pre>
          </div>
        </section>

        <section class="panel panel-primary" id="chat-panel">
          <div class="chat-header">
            <h2>對話中心</h2>
            <div class="chat-actions">
              <button class="btn btn-secondary" id="refresh-host">重新整理專案</button>
            </div>
          </div>
          <div class="chat-history" id="chat-history"></div>
          <form id="chat-form" class="chat-input">
            <textarea id="chat-prompt" placeholder="輸入您的需求，例如：分析最新日誌並修正錯誤" required></textarea>
            <button type="submit" class="btn btn-accent">送出</button>
          </form>
        </section>

        <section class="panel panel-secondary" id="host-panel">
          <h2>AI 托管模式</h2>
          <form id="host-form" class="stack">
            <label class="field">
              <span>起始任務描述</span>
              <textarea name="request" rows="3" placeholder="請自動排查程式錯誤並提供修正方案" required></textarea>
            </label>
            <label class="field">
              <span>執行指令</span>
              <input type="text" name="command" value="python test.py" />
            </label>
            <label class="field">
              <span>最大迭代次數</span>
              <input type="number" name="max_iterations" min="1" max="20" value="5" />
            </label>
            <button type="submit" class="btn btn-primary">啟動托管模式</button>
          </form>
          <div class="host-results" id="host-results"></div>
        </section>
      </main>
    </div>

    <template id="message-template">
      <div class="message">
        <div class="avatar"></div>
        <div class="bubble">
          <div class="meta">
            <span class="role"></span>
            <span class="time"></span>
          </div>
          <div class="content"></div>
        </div>
      </div>
    </template>

    <template id="iteration-template">
      <article class="iteration">
        <header>
          <span class="iteration-number"></span>
          <span class="iteration-summary"></span>
        </header>
        <section class="iteration-body"></section>
      </article>
    </template>

    <script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
  </body>
</html>
