<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 自動化開發控制器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand__logo">🤖</span>
        <div class="brand__meta">
          <h1>AI 自動化開發控制器</h1>
          <p>2025 最佳實踐 · 模組化重構版本</p>
        </div>
      </div>
      <button id="toggleProjectPanel" class="ghost-button" type="button">專案列表</button>
    </header>

    <main class="app-main">
      <aside id="projectPanel" class="panel panel--left">
        <h2>專案與設定</h2>
        <section class="panel__section">
          <label class="field">
            <span class="field__label">專案名稱</span>
            <input id="projectName" class="field__input" placeholder="輸入或選擇專案" />
          </label>
          <button id="createProject" class="primary-button" type="button">建立專案</button>
        </section>
        <section class="panel__section" id="projectListSection">
          <h3>現有專案</h3>
          <ul id="projectList" class="project-list"></ul>
        </section>
        <section class="panel__section">
          <h3>AI 設定</h3>
          <div class="setting-item">
            <label class="field">
              <span class="field__label">模型</span>
              <input id="modelName" class="field__input" value="{{ feature_flags.enable_prompt_library and 'gemini-2.0-flash-exp' or '' }}" />
            </label>
            <label class="field">
              <span class="field__label">API Key</span>
              <input id="apiKey" class="field__input" type="password" placeholder="輸入 Google API Key" />
            </label>
          </div>
        </section>
      </aside>

      <section class="conversation">
        <div class="conversation__history" id="conversationHistory"></div>
        <div class="conversation__composer">
          <textarea
            id="promptInput"
            class="composer__textarea"
            rows="3"
            placeholder="描述你的自動化需求，例如：請掃描日誌找出錯誤並修正程式。"
          ></textarea>
          <div class="composer__actions">
            <button id="sendPrompt" class="primary-button" type="button">送出請求</button>
            <button id="runHosting" class="secondary-button" type="button">啟動托管模式</button>
          </div>
        </div>
      </section>

      <aside class="panel panel--right">
        <div class="panel__section">
          <h2>自動化狀態</h2>
          <div id="automationStatus" class="status-card">
            <p>尚未開始</p>
          </div>
        </div>
        <div class="panel__section">
          <h2>最新輸出</h2>
          <pre id="terminalOutput" class="terminal"></pre>
        </div>
        <div class="panel__section">
          <h2>UI 截圖</h2>
          <div id="screenshotGallery" class="gallery"></div>
        </div>
      </aside>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="message__avatar"></div>
        <div class="message__body">
          <header class="message__meta">
            <span class="message__role"></span>
            <span class="message__time"></span>
          </header>
          <div class="message__content"></div>
        </div>
      </article>
    </template>

    <script>
      window.APP_CONFIG = {
        featureFlags: {{ feature_flags|tojson }},
      };
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}" type="module"></script>
  </body>
</html>
